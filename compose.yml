services:
  db:
    image: postgres:18
    restart: unless-stopped
    env_file:
      - .env.postgres
    environment:
      POSTGRES_DB: photos_production
      POSTGRES_USER: photos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photos -d photos_production"]
      interval: 30s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  web:
    build: .
    image: photos:production
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      RAILS_ENV: production
      PGHOST: db
      PGUSER: photos
      REDIS_URL: redis://redis:6379/0
      SOLID_QUEUE_IN_PUMA: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:80"
    volumes:
      - ${PHOTOS_STORAGE_PATH:-app_storage}:/rails/storage
      - ${PHOTOS_IMPORT_PATH:-/mnt/photos/imports}:/rails/imports:ro

  worker:
    image: photos:production
    restart: unless-stopped
    command: ["./bin/jobs"]
    env_file:
      - .env.production
    environment:
      RAILS_ENV: production
      PGHOST: db
      PGUSER: photos
      REDIS_URL: redis://redis:6379/0
      SOLID_QUEUE_IN_PUMA: "false"
      JOB_PROCESSES: ${JOB_PROCESSES:-1}
      IMPORT_JOB_THREADS: ${IMPORT_JOB_THREADS:-1}
      ARCHIVE_JOB_THREADS: ${ARCHIVE_JOB_THREADS:-1}
      MAINTENANCE_JOB_THREADS: ${MAINTENANCE_JOB_THREADS:-1}
      ANALYSIS_JOB_THREADS: ${ANALYSIS_JOB_THREADS:-1}
      DERIVATIVE_JOB_THREADS: ${DERIVATIVE_JOB_THREADS:-3}
      DEFAULT_JOB_THREADS: ${DEFAULT_JOB_THREADS:-1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${PHOTOS_STORAGE_PATH:-app_storage}:/rails/storage
      - ${PHOTOS_IMPORT_PATH:-/mnt/photos/imports}:/rails/imports:ro

volumes:
  postgres_data:
  redis_data:
  app_storage:
