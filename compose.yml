x-web-service: &web
  build: .
  image: photos:production
  restart: unless-stopped
  env_file:
    - .env.production
  environment:
    RAILS_ENV: production
    PGHOST: db
    PGUSER: photos
    REDIS_URL: redis://redis:6379/0
    SOLID_QUEUE_IN_PUMA: "false"
    SKIP_DB_PREPARE: ${SKIP_DB_PREPARE:-false}
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  healthcheck:
    test: ["CMD-SHELL", "curl -fsS -H \"Host: $${PHOTOS_HOST:-photos.example.com}\" http://127.0.0.1/up >/dev/null"]
    interval: 30s
    timeout: 3s
    start_period: 20s
    retries: 12
  volumes:
    - ${PHOTOS_STORAGE_PATH:?Set PHOTOS_STORAGE_PATH to the production Active Storage path before running docker compose. Use ./scripts/deploy or export PHOTOS_STORAGE_PATH=/mnt/photos/app_storage.}:/rails/storage
    - ${PHOTOS_IMPORT_PATH:-/mnt/photos/imports}:/rails/imports:ro

services:
  db:
    image: postgres:18
    restart: unless-stopped
    env_file:
      - .env.postgres
    environment:
      POSTGRES_DB: photos_production
      POSTGRES_USER: photos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photos -d photos_production"]
      interval: 30s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  app_proxy:
    image: nginx:1.29-alpine
    restart: unless-stopped
    depends_on:
      web_blue:
        condition: service_healthy
        required: false
      web_green:
        condition: service_healthy
        required: false
    ports:
      - "3000:80"
    volumes:
      - type: bind
        source: ./config/nginx/photos.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./tmp/nginx/active_upstream.conf
        target: /etc/nginx/active_upstream.conf
        read_only: true
        bind:
          create_host_path: false

  web_blue:
    <<: *web
    profiles: ["bluegreen"]
    container_name: photos-web-blue

  web_green:
    <<: *web
    profiles: ["bluegreen"]
    container_name: photos-web-green

  worker:
    image: photos:production
    restart: unless-stopped
    command: ["./bin/jobs"]
    env_file:
      - .env.production
    environment:
      RAILS_ENV: production
      PGHOST: db
      PGUSER: photos
      REDIS_URL: redis://redis:6379/0
      SOLID_QUEUE_IN_PUMA: "false"
      JOB_PROCESSES: ${JOB_PROCESSES:-1}
      IMPORT_JOB_THREADS: ${IMPORT_JOB_THREADS:-1}
      ARCHIVE_JOB_THREADS: ${ARCHIVE_JOB_THREADS:-1}
      MAINTENANCE_JOB_THREADS: ${MAINTENANCE_JOB_THREADS:-1}
      ANALYSIS_JOB_THREADS: ${ANALYSIS_JOB_THREADS:-1}
      DERIVATIVE_JOB_THREADS: ${DERIVATIVE_JOB_THREADS:-3}
      DEFAULT_JOB_THREADS: ${DEFAULT_JOB_THREADS:-1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${PHOTOS_STORAGE_PATH:?Set PHOTOS_STORAGE_PATH to the production Active Storage path before running docker compose. Use ./scripts/deploy or export PHOTOS_STORAGE_PATH=/mnt/photos/app_storage.}:/rails/storage
      - ${PHOTOS_IMPORT_PATH:-/mnt/photos/imports}:/rails/imports:ro

  analysis-local:
    build: ./services/analysis_local
    image: photos-analysis-local:latest
    restart: unless-stopped
    profiles: ["analysis"]
    environment:
      MODEL_CACHE_DIR: /models
      ANALYSIS_INDEX_DIR: /analysis
      OPENCLIP_MODEL: ${OPENCLIP_MODEL:-ViT-B-32}
      OPENCLIP_PRETRAINED: ${OPENCLIP_PRETRAINED:-laion2b_s34b_b79k}
    volumes:
      - ${PHOTOS_STORAGE_PATH:?Set PHOTOS_STORAGE_PATH to the production Active Storage path before running docker compose. Use ./scripts/deploy or export PHOTOS_STORAGE_PATH=/mnt/photos/app_storage.}:/rails/storage:ro
      - analysis_model_cache:/models
      - analysis_index:/analysis
    expose:
      - "8000"

volumes:
  postgres_data:
  redis_data:
  analysis_model_cache:
  analysis_index:
