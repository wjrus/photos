production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  original_file_health_patrol:
    command: "OriginalFileHealthPatrolJob.perform_later(batch_size: 100)"
    schedule: every hour at minute 37
  refresh_photo_location_bounds:
    command: "RefreshPhotoLocationBoundsJob.perform_later"
    schedule: every day at 3:24am
